name: "DevSecOps CI/CD Pipeline TES"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: wassimoz/devsecops-project

jobs:


  sast-scan:
    name: "Secrets & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install bandit safety pytest

      - name: Bandit scan
        run: bandit -r app/ -f json -o bandit-report.json -ll --exclude app/tests

      - name: Safety scan
        run: safety check -r app/requirements.txt --json > safety-report.json || true

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest pytest-cov

      - name: Run tests
        run: |
          cd app
          pytest tests/ -v --junitxml=test-results.xml

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json
            app/test-results.xml


  build-scan:
    name: "Build & Container Security"
    runs-on: ubuntu-latest
    needs: sast-scan

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.PWD }}

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest


  dast-scan:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.PWD }}

      - name: Run app
        run: |
          docker run -d --name test-app -p 5000:5000 ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait app
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health; then exit 0; fi
            sleep 3
          done
          exit 1

      - name: ZAP scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Cleanup
        if: always()
        run: docker rm -f test-app


  deploy-k8s:
    name: "Deploy — Kubernetes"
    runs-on: [self-hosted, Windows, X64]
    needs: dast-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Set kubeconfig
        shell: pwsh
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          if (-not $env:KUBECONFIG_B64) {
            Write-Error "KUBECONFIG_B64 is missing"
            exit 1
          }

          $kubePath = "$HOME\.kube"
          New-Item -ItemType Directory -Force -Path $kubePath | Out-Null

          [IO.File]::WriteAllBytes(
            "$kubePath\config",
            [Convert]::FromBase64String($env:KUBECONFIG_B64)
          )

          Write-Host "kubeconfig configured successfully"

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Create secret
        run: |
          kubectl create secret generic devsecops-secret `
            --from-literal=secret-key="${{ secrets.APP_SECRET_KEY }}" `
            --namespace=devsecops `
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image
        run: |
          kubectl set image deployment/devsecops-app `
            devsecops-app=${{ env.IMAGE_NAME }}:${{ github.sha }} `
            -n devsecops

      - name: Rollout status
        run: |
          kubectl rollout status deployment/devsecops-app -n devsecops

      - name: Verify
        run: |
          kubectl get pods -n devsecops
          kubectl get svc -n devsecops