name: "DevSecOps CI/CD Pipeline TES"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: wassimoz/devsecops-project
  AWS_REGION: eu-west-1
  EKS_CLUSTER: devsecops-cluster


jobs:

  sast-scan:
    name: "Secrets & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install bandit safety pytest

      - name: Bandit scan
        run: bandit -r app/ -f json -o bandit.json -ll --exclude app/tests

      - name: Safety scan
        run: safety check -r app/requirements.txt --json > safety.json || true

      - name: Run tests
        run: |
          cd app
          pytest tests/ -v --junitxml=test-results.xml

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit.json
            safety.json
            app/test-results.xml


  build-scan:
    name: "Build & Container Security"
    runs-on: ubuntu-latest
    needs: sast-scan
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.PWD }}

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif

      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest


  dast-scan:
    name: "DAST - OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.PWD }}

      - name: Run container
        run: |
          docker run -d --name app -p 5000:5000 \
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait app
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:5000/health && break
            sleep 3
          done

      - name: OWASP ZAP scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          cmd_options: "-w /tmp"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Cleanup
        if: always()
        run: docker rm -f app


  deploy-k8s:
    name: "Deploy to AWS EKS"
    runs-on: ubuntu-latest
    needs: dast-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Create secret
        run: |
          kubectl create secret generic devsecops-secret \
            --from-literal=secret-key="${{ secrets.APP_SECRET_KEY }}" \
            --namespace=devsecops \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image
        run: |
          kubectl set image deployment/devsecops-app \
            devsecops-app=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n devsecops

      - name: Rollout status
        run: |
          kubectl rollout status deployment/devsecops-app -n devsecops

      - name: Final verification
        run: |
          kubectl get pods -n devsecops
          kubectl get svc -n devsecops