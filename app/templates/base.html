<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}DevSecOps App{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
    nav {
      background: #1a1a2e; padding: 0 32px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: .5px; }
    .nav-links a {
      color: #9ca3af; text-decoration: none; font-size: 14px; margin-left: 24px;
      transition: color .15s;
    }
    .nav-links a:hover { color: #fff; }
    .container { max-width: 880px; margin: 48px auto; padding: 0 20px; }
    .card {
      background: #fff; border-radius: 12px; padding: 36px 40px;
      border: 1px solid #e5e7eb;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
    p  { color: #6b7280; line-height: 1.65; margin-bottom: 12px; font-size: 15px; }
    .btn {
      display: inline-block; padding: 9px 22px; border-radius: 8px;
      background: #1a1a2e; color: #fff; font-size: 14px; font-weight: 500;
      text-decoration: none; border: none; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-ghost {
      background: transparent; color: #1a1a2e;
      border: 1px solid #d1d5db; margin-left: 10px;
    }
    .btn-ghost:hover { background: #f4f6f9; opacity: 1; }
    .btn-danger { background: #dc2626; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 18px; }
    .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-blue  { background: #dbeafe; color: #1e40af; }
    .badge-gray  { background: #f3f4f6; color: #374151; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-logo">&#128274; DevSecOps App</span>
    <div class="nav-links">
      {% if session.username %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('home') }}">Accueil</a>
        <a href="{{ url_for('login') }}">Login</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
