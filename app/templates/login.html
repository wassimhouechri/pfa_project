{% extends "base.html" %}
{% block title %}Login — DevSecOps App{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:0 auto;">
  <h2>Connexion</h2>
  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="{{ url_for('login') }}">
    <div style="margin-bottom:16px;">
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">Nom d'utilisateur</label>
      <input type="text" name="username" required autocomplete="username"
        style="width:100%;padding:9px 13px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;"
        placeholder="admin"/>
    </div>
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">Mot de passe</label>
      <input type="password" name="password" required autocomplete="current-password"
        style="width:100%;padding:9px 13px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;"
        placeholder="••••••••"/>
    </div>
    <button type="submit" class="btn" style="width:100%;">Se connecter</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:13px;">
    <a href="{{ url_for('home') }}" style="color:#1a1a2e;">← Retour</a>
  </p>
</div>
{% endblock %}
