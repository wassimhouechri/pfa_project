# ⚠️  DO NOT put real secret values in this file.
# This file is a template — the actual Secret is created by the CI/CD pipeline
# using the GitHub Secret ${{ secrets.APP_SECRET_KEY }}.
#
# To create it manually (local/dev):
#   kubectl create secret generic devsecops-secret \
#     --from-literal=secret-key='<your-strong-key>' \
#     --namespace=devsecops \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: devsecops-secret
  namespace: devsecops
type: Opaque
# data is intentionally empty — injected at deploy time by the pipeline
data: {}
